app-id: app.shizumu.Shizumu
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: shizumu
tags: 
  - proprietary
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  # system tray (gnome appindicator, kde statusnotifier)
  - --talk-name=org.kde.StatusNotifierItem
  - --talk-name=com.canonical.AppMenu.Registrar
modules:
  - shared-modules/libayatana-appindicator/libayatana-appindicator-gtk3.json

  - name: shizumu
    buildsystem: simple
    build-commands:
      - install -Dm755 shizumu /app/bin/shizumu
      - install -Dm755 shizumu-cli /app/bin/shizumu-cli
      # Strip the native-install env wrapper from the .desktop's Exec line.
      # Flatpak's exporter takes the first word of Exec= as the --command for
      # `flatpak run`, so leaving "env GDK_BACKEND=x11" in place rewrites the
      # exported launcher to "flatpak run --command=env … GDK_BACKEND=x11
      # shizumu", which forces x11 inside the sandbox. With finish-args
      # `--socket=fallback-x11`, no X11 socket is provided on Wayland
      # sessions, so the desktop-icon launch fails silently while CLI launch
      # (which uses the manifest's `command: shizumu` directly with no env
      # override) works. Native rpm/deb keep the env wrapper for the v0.2.1
      # webkit Wayland-input fix.
      - desktop-file-edit --set-key=Exec --set-value=shizumu app.shizumu.Shizumu.desktop
      - install -Dm644 app.shizumu.Shizumu.desktop /app/share/applications/app.shizumu.Shizumu.desktop
      - install -Dm644 icon-32.png /app/share/icons/hicolor/32x32/apps/app.shizumu.Shizumu.png
      - install -Dm644 icon-128.png /app/share/icons/hicolor/128x128/apps/app.shizumu.Shizumu.png
      - install -Dm644 icon-256.png /app/share/icons/hicolor/256x256/apps/app.shizumu.Shizumu.png
      - install -Dm644 icon-512.png /app/share/icons/hicolor/512x512/apps/app.shizumu.Shizumu.png
      - install -Dm644 app.shizumu.Shizumu.metainfo.xml /app/share/metainfo/app.shizumu.Shizumu.metainfo.xml
    sources:
      - type: archive
        url: https://gitlab.com/api/v4/projects/81041793/packages/generic/shizumu/0.2.16/shizumu-0.2.16-linux-x86_64.tar.gz
        sha256: d0e30ed954999126a24ce0b105ecc70cefb53b16d7cb0b916f7c00bf93c9b36f
        x-checker-data:
          type: json
          url: https://gitlab.com/api/v4/projects/81041793/releases/permalink/latest
          version-query: .tag_name | sub("^v"; "")
          url-query: .assets.links[] | select(.name == "linux-tarball") | .url
